<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Secure Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: #05070a;
            overflow: hidden;
        }

        /* Animated Mesh Background */
        .mesh-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(79, 70, 229, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(147, 51, 234, 0.15) 0%, transparent 40%);
            z-index: -1;
        }

        /* Scanning Animation */
        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        .scanner::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 2px;
            background: #6366f1;
            box-shadow: 0 0 15px #6366f1;
            animation: scan 3s linear infinite;
        }

        /* Glassmorphism with Neon Border */
        .neo-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .neo-card:hover {
            transform: translateY(-5px) scale(1.01);
            border: 1px solid rgba(99, 102, 241, 0.4);
            box-shadow: 0 0 40px rgba(99, 102, 241, 0.1);
        }

        /* Custom Input Styling */
        .glass-input {
            background: rgba(255, 255, 255, 0.03) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
            transition: all 0.3s ease;
        }
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.07) !important;
            border-color: #6366f1 !important;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
        }

        /* Staggered Entry Animation */
        @keyframes reveal {
            from { opacity: 0; transform: translateY(30px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .reveal { animation: reveal 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="mesh-bg"></div>

    <div class="w-full max-w-md reveal">
        
        <div class="neo-card p-10 rounded-[2.5rem] overflow-hidden">
            
            <div class="absolute top-0 left-1/2 -translate-x-1/2 w-1/2 h-1 bg-indigo-500 blur-md opacity-50"></div>

            <div class="relative flex flex-col items-center mb-12">
                <div class="scanner relative w-25 h-20 bg-slate-900 rounded-2xl flex items-center justify-center border border-slate-800 mb-6 overflow-hidden">
                    <img src="{{ url_for('static', filename='images/8847c86f-cb5f-4e2e-b840-b07021a4aab8.jpg') }}" alt="Logo" class="w-50 h-60 object-contain z-10">
                </div>
                <h2 class="text-3xl font-extrabold text-white tracking-tight">Nexus Portal</h2>
                <p class="text-slate-400 mt-2 text-sm font-light">Awaiting biometric or digital credentials...</p>
            </div>

            {% if error %}
            <div class="mb-8 p-4 bg-red-500/10 border border-red-500/50 rounded-xl text-red-400 text-xs flex items-center gap-3 animate-bounce">
                <svg fill="currentColor" viewBox="0 0 20 20" class="w-4 h-4"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"/></svg>
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" class="space-y-6">
                <div class="group">
                    <label class="block text-[10px] uppercase tracking-[0.2em] font-bold text-slate-500 mb-2 ml-1 group-focus-within:text-indigo-400 transition-colors">Credential ID</label>
                    <input type="text" name="username" required
                        class="glass-input w-full px-6 py-4 rounded-2xl outline-none text-lg"
                        placeholder="admin_nexus">
                </div>

                <div class="group">
                    <div class="flex justify-between items-center mb-2 ml-1">
                        <label class="text-[10px] uppercase tracking-[0.2em] font-bold text-slate-500 group-focus-within:text-indigo-400 transition-colors">Access Key</label>
                        <a href="#" class="text-[10px] text-indigo-400 hover:text-indigo-300 font-bold tracking-widest uppercase">Lost Key?</a>
                    </div>
                    <input type="password" name="password" required
                        class="glass-input w-full px-6 py-4 rounded-2xl outline-none text-lg"
                        placeholder="••••••••">
                </div>

                <button type="submit" 
                    class="relative w-full group mt-4">
                    <div class="absolute -inset-1 bg-gradient-to-r from-indigo-600 to-purple-600 rounded-2xl blur opacity-30 group-hover:opacity-100 transition duration-1000 group-hover:duration-200"></div>
                    <div class="relative w-full bg-slate-900 text-white font-bold py-5 rounded-2xl flex items-center justify-center gap-3 transition-transform active:scale-95">
                        <span>Initialize Session</span>
                        <svg class="w-5 h-5 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"/></svg>
                    </div>
                </button>
            </form>

            <div class="mt-12 flex justify-center">
                <div class="px-5 py-2 rounded-full border border-white/5 bg-white/5 flex items-center gap-3 group cursor-help">
                    <div class="w-1.5 h-1.5 bg-indigo-500 rounded-full group-hover:animate-ping"></div>
                    <span class="text-[10px] text-slate-500 font-bold tracking-tighter uppercase italic">Secure Uplink Established</span>
                </div>
            </div>
        </div>

        <div class="mt-8 flex justify-between px-6 text-[10px] text-slate-600 font-mono">
            <span>SYS_VER: 2.0.4</span>
            <span>NODE: SECURE_ALPHA</span>
        </div>
    </div>

</body>
</html>
